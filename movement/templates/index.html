<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Robot Control Center</title>
    <meta name="description" content="AXON Robot 8-directional control interface">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F916;</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Robot Control</h1>
        <div class="subtitle">Hold to move &middot; Combine W/A/S/D for diagonals</div>

        <div id="connection" class="connection-badge offline">
            <span class="dot"></span>
            <span id="conn-text">Checking...</span>
        </div>

        <div class="grid">
            <button class="btn btn-diag" id="btn-fl" data-cmd="fwd_left">
                <span class="icon">&#x2196;</span>FWD-L
            </button>
            <button class="btn" id="btn-fwd" data-cmd="robot_fwd">
                <span class="icon">&#x25B2;</span>FWD
            </button>
            <button class="btn btn-diag" id="btn-fr" data-cmd="fwd_right">
                <span class="icon">&#x2197;</span>FWD-R
            </button>

            <button class="btn" id="btn-left" data-cmd="spin_ccw">
                <span class="icon">&#x25C0;</span>LEFT
            </button>
            <button class="btn btn-stop" id="btn-stop" data-cmd="stop">
                <span class="icon">&#x25A0;</span>STOP
            </button>
            <button class="btn" id="btn-right" data-cmd="spin_cw">
                <span class="icon">&#x25B6;</span>RIGHT
            </button>

            <button class="btn btn-diag" id="btn-bl" data-cmd="back_left">
                <span class="icon">&#x2199;</span>REV-L
            </button>
            <button class="btn" id="btn-rev" data-cmd="robot_back">
                <span class="icon">&#x25BC;</span>REV
            </button>
            <button class="btn btn-diag" id="btn-br" data-cmd="back_right">
                <span class="icon">&#x2198;</span>REV-R
            </button>
        </div>

        <div id="status">&#x25CF; System Idle</div>

        <div class="keyboard-hint">
            <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> to move &middot;
            Combine for diagonals (e.g. <kbd>W</kbd>+<kbd>A</kbd>) &middot;
            <kbd>Space</kbd> stop
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
